<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Headlines | Times of India Network</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/headline.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8788515012949701"
     crossorigin="anonymous"></script>
</head>

<body>

<!-- ================= HEADER ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            Top today <span class="text-warning">Headlines</span>
        </a>

       
    </div>
</nav>

<!-- ================= HERO ================= -->
<header class="hero-section text-center text-light">
    <div class="container">
        <h1 class="display-5 fw-bold">
            Today’s Headlines
        </h1>
        <p class="lead">
            Stories that shape the morning. Truth served fresh.
        </p>
    </div>
</header>

<!-- ================= NEWS GRID ================= -->
<div class="container my-5">
    <div class="row g-4">

        {% for id, i in news %}
        <div class="col-sm-12 col-md-6 col-lg-4">
            <div class="headline-card h-100">

                

                <h5 class="headline-text">
                    <a href="{{ url_for('article', news_id=id) }}">
                        {{ i }}
                    </a>
                </h5>

                <div class="mt-auto">
                    <a href="{{ url_for('article', news_id=id) }}" class="read-more">
                        Read full story →
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

<!-- ================= FOOTER ================= -->
<footer class="footer bg-dark text-light mt-5">
    <div class="container py-4 text-center">
        <p class="mb-1">
            © 2026 Times of India Network
        </p>
        <small class="text-secondary">
            Journalism rooted in truth. Designed for tomorrow.
        </small>

        <!-- <div class="mt-3">
            <i class="fab fa-twitter mx-2"></i>
            <i class="fab fa-facebook mx-2"></i>
            <i class="fab fa-instagram mx-2"></i>
        </div> -->
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
